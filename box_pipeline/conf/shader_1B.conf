# conf/usable_3B.conf — ~3.6B general LM, multi-day DDP run on 2x H100 -> usable.
#
# Same architecture as olmo_3B_h100.conf (d=3072/24L/GQA, Muon) but tuned for a
# real multi-day run on llmcpp, SPEED-FIRST:
#   - num_mtp_heads=0 -> pure next-token LM: ~30% fewer FLOPs AND lets CUDA graphs
#                        fit (MTP's extra LM heads OOM the graph pool).
#   - cuda_graph = 1  -> eliminates per-kernel launch overhead (the big lever).
#   - fused = 0       -> kernel-wired standard Transformer; the path with resume
#                        + latest.pt. (fused=1 is ~1.2x more but resume isn't
#                        wired there yet.)
#   - resume = 1      -> relaunch after a crash continues from the last checkpoint.
#   - multi_res/mup/sgp off -> clean standard training on plain GPT-2 web tokens.
#
# 3.6B Muon fits ONE H100 -> DDP (replicated, 2x aggregate). With graphs + no MTP,
# expect ~30-35k tok/s aggregate -> ~12B tokens ≈ ~4-5 days/epoch. Checkpoints
# every 2000 steps; chat runs/usable_3B/checkpoints/latest.pt anytime.

[model]
d_model			2048
vocab_size		16448
n_layers		24
n_heads			16
n_kv_heads		8
head_dim		128
rope_theta		500000
layer_norm_eps		1e-6
init_std		0.008
hidden_size_multiple_of	256
hidden_size_multiplier	1.5		# FFN hidden = 8/3 * 3072 * 1.5 ≈ 12288
use_qk_norm		1
use_head_qk_norm	0
layer_norm_type		rms_norm
block_type		reordered_norm
attention_backend	sdpa
gated_attention		none
sliding_window_size	-1
rope_scaling_type	none
use_float8		0
use_conv		0
use_moe			0
multi_res		0

num_mtp_heads		0		# 0 = pure next-token LM: ~30% fewer FLOPs AND unblocks
mtp_loss_weight		0.1		# CUDA graphs (MTP's 4 LM heads OOM the graph pool).

activation_checkpoint_mode	none
activation_checkpoint_interval	1

[training]
steps			10000
batch_size		4
seq_len			2048
lr			3e-4
warmup_steps		500
grad_accum		8
optimizer		muon
scheduler		cosine
weight_decay		0.01
max_grad_norm		1.0
seed			42

bf16			1
amp			0
grad_scaler		0

profile			0
log_interval		50

save			runs/shader_1B/model.pt
checkpoint_dir		runs/shader_1B/ckpt
checkpoint_interval	1000
keep_checkpoints	2		# 3.6B Muon checkpoints are large; keep 2
resume			1
report_every		300
heartbeat_path		runs/shader_1B/hb.txt

[optimization]
fused			0		# standard Transformer = has resume + latest.pt + kernels
foreach_optimizer	1
gpu_data		0
cuda_graph		0
async_muon		1		# Newton-Schulz on a side stream
mup			0
multi_res		0
zero1			0
fsdp			0
sgp			0

[data]
data_path		/home/exouser/shader_data/corpus_v4/shaders_glslbpe.npy
bpe_vocab		/home/exouser/shader_data/glsl_bpe16k/vocab.json

[device]
device			cuda
