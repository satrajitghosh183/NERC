# scripts/race/configs/race_250m_cpp.conf
#
# 250M-class C++ side of the race. Untied embeddings (the C++ model
# class doesn't support tying); Python matches by setting weight_tying:false.
#
# d_model=1024 / n_layers=12 / n_heads=16 / head_dim=64 / vocab=50257
# hidden_size_multiplier=1.0 + multiple_of=256 → ffn_hidden = 2816
#
# Parameter count:
#   2*50257*1024 embed/lm_head : 102.9 M
#   12 × (4*1024² + 3*1024*2816 + 2*1024) per-layer : 154.2 M
#   3 MTP heads (transform + norm) : 3.2 M
#   ──────────────────────────────────────
#   total                              ≈ 260 M
#
# Python YAML matches the backbone (~257 M); MTP is the C++-only delta.

# ─────────────────────────────────────────────────────────────────────
# Optimizations enabled (cross-reference scripts/race/OPTIMIZATIONS.md)
#   Always-on at the kernel level (no config needed):
#     • WMMA tensor-core fused_ffn + fused_qkv_rope          (sm_80+)
#     • TMA async-load fused_ffn variant                     (sm_90+)
#     • cuBLASLt direct (fast_linear) — LM head, FFN backward,
#                                       attention out-proj,
#                                       QKV backward, CE backward
#     • cuBLASLt descriptor cache (D3) + heuristic algo (D5)
#     • Autograd wrappers for rms_norm / silu_mul / apply_rope (PyTorch 2.3+ compat)
#     • A1 saved gate_up (no recompute in FFN backward)
#     • A2 half-rotation inverse RoPE
#     • A3 fused LM-head + softmax-CE (no logits materialization)
#     • A4 cached packed QKV weight
#     • B2 vectorized fp32→bf16 WMMA stores
#     • B3 fused RMSNorm backward kernel
#     • B4 vectorized bf16 silu_mul
#
#   Enabled via config flags below:
#     • fused              = 0   ← KEEP 0: routes to Transformer which has
#                                     all kernel wirings. "fused=1" picks the
#                                     older FusedTransformer that lacks them.
#     • cuda_graph         = 1   ← whole-step CUDA graph (now supported in
#                                     Transformer::train(); see src/train.cpp)
#     • bf16               = 1   ← all params + activations bf16
#     • foreach_optimizer  = 1   ← ForeachAdamW (batched _foreach_)
#     • gpu_data           = 1   ← tokenized corpus stays in VRAM
# ─────────────────────────────────────────────────────────────────────

# Architecture matches OLMo-core's TransformerConfig.llama2_271M(n_layers=12,
# n_heads=8) EXACTLY so the Python race side is the identical model:
#   d_model=1024, n_heads=8 (head_dim=128), n_kv_heads=8 (no GQA),
#   ffn=2816, vocab=50304 (GPT-2 padded to mult of 128),
#   layer_norm_eps=1e-5, rope_theta=10000, untied embeddings.
[model]
d_model                          = 1024
n_layers                         = 12
n_heads                          = 8
n_kv_heads                       = 8
head_dim                         = 128
vocab_size                       = 50304       # GPT-2 padded (matches OLMo-core)

hidden_size_multiplier           = 1.0       # → base = 8*1024/3 = 2730.67
hidden_size_multiple_of          = 256       # → ensure_multiple_of → 2816

rope_theta                       = 10000
layer_norm_eps                   = 1e-5        # llama_like default (NOT 1e-6)
init_std                         = 0.02

# All extras off.
use_qk_norm                      = 0
use_head_qk_norm                 = 0
block_type                       = reordered_norm
attention_backend                = sdpa
gated_attention                  = none
sliding_window_size              = -1
rope_scaling_type                = none
layer_norm_type                  = rms_norm
use_float8                       = 0
use_conv                         = 0
use_moe                          = 0
multi_res                        = 0

# MTP — kept on. C++ inference uses these via linear-chain speculative.
num_mtp_heads                    = 3
mtp_loss_weight                  = 0.1

# No activation checkpointing — we have VRAM at 250M.
activation_checkpoint_mode       = none
activation_checkpoint_interval   = 1

[training]
steps                            = 1000
batch_size                       = 32
seq_len                          = 1024
lr                               = 3.0e-4
warmup_steps                     = 100
grad_accum                       = 1          # effective batch = 32 seqs = 32768 tok/step, no accumulation
optimizer                        = adamw      # routes through ForeachAdamW when foreach_optimizer=1
scheduler                        = cosine
weight_decay                     = 0.1
max_grad_norm                    = 1.0

bf16                             = 1
amp                              = 0
grad_scaler                      = 0

log_interval                     = 10

async_muon                       = 0
sgp_enabled                      = 0

# Save the final model so 06_infer_cpp.sh can load it for the inference
# race. main.cpp reads `save` from [training] and torch::save()s here.
save                             = scripts/race/results/cpp_ckpt/model.pt

[optimization]
# IMPORTANT: 0 (not 1). Routes through AttentionImpl which has every
# fused-kernel wiring. Setting 1 routes through the legacy
# FusedTransformer that lacks them.
fused                            = 0

foreach_optimizer                = 1
gpu_data                         = 1
# Chunked CE (Vc=4096 tiles) keeps peak CUDA-graph private pool ≈16 GB
# (vs ~53 GB with the old full-[N,V] materialisation that caused OOM).
# Warmup still runs (3 steps) to prime fused-FFN and fused-QKV JIT.
cuda_graph                       = 1
zero1                            = 0          # single GPU
mup                              = 0

[data]
data_path                        = data/race_tokens.npy
bpe_vocab                        = data/gpt2/vocab.json

[device]
device                           = cuda
