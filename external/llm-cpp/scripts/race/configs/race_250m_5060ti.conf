# scripts/race/configs/race_250m_5060ti.conf
#
# RTX 5060 Ti 16 GB (Blackwell sm_120) variant of race_250m_cpp.conf.
# SAME model as the H100 race (260M, identical arch) so the train-vs-OLMo
# comparison stays apples-to-apples — only the memory/throughput knobs change.
#
# Why the changes vs the H100 config:
#   • gpu_data   = 0  → the 1.9B-token corpus does NOT fit in 16 GB VRAM
#                       alongside the model; stream batches from disk instead.
#   • cuda_graph = 0  → whole-step graph capture needs a ~13-16 GB private pool
#                       for the chunked CE across 4 heads — that's the entire
#                       5060 Ti. Graphs stay off here (still correct, just no
#                       graph speedup). The kernel-stream + init + fp32-master
#                       fixes make non-graph bf16 training stable on their own.
#   • activation_checkpoint_mode = full → trades recompute for memory; the
#                       single biggest VRAM lever. Required at this size.
#   • batch_size = 4, grad_accum = 8 → effective batch 32 (matches the H100
#                       race's effective batch for a fair comparison), but only
#                       4 sequences live in VRAM at once. If `nvidia-smi` shows
#                       headroom after a stable run, bump batch_size to 8 and
#                       drop grad_accum to 4 for ~2x throughput.
#
# Rough 16 GB budget at batch 4 / seq 1024 / act-ckpt full:
#   params bf16 0.5 + fp32 master 1.0 + 2x fp32 moments 2.1 + bf16 grads 0.5
#   + fp32 grad-upcast scratch ~1.0 + activations (checkpointed) ~2-3
#   + chunked-CE tiles ~0.5  ≈ 8-9 GB.  Comfortable headroom.

[model]
d_model                          = 1024
n_layers                         = 12
n_heads                          = 8
n_kv_heads                       = 8
head_dim                         = 128
vocab_size                       = 50304

hidden_size_multiplier           = 1.0
hidden_size_multiple_of          = 256

rope_theta                       = 10000
layer_norm_eps                   = 1e-5
init_std                         = 0.02

use_qk_norm                      = 0
use_head_qk_norm                 = 0
block_type                       = reordered_norm
attention_backend                = sdpa
gated_attention                  = none
sliding_window_size              = -1
rope_scaling_type                = none
layer_norm_type                  = rms_norm
use_float8                       = 0          # sm_120 fp8 kernels not built yet — keep 0
use_conv                         = 0
use_moe                          = 0
multi_res                        = 0

num_mtp_heads                    = 3
mtp_loss_weight                  = 0.1

# Activation checkpointing ON — the key memory lever for 16 GB.
activation_checkpoint_mode       = full
activation_checkpoint_interval   = 1

[training]
steps                            = 1000
batch_size                       = 4          # 8 if nvidia-smi shows headroom after a stable run
seq_len                          = 1024
lr                               = 3.0e-4
warmup_steps                     = 100
grad_accum                       = 8          # effective batch = 4 * 8 = 32 (matches H100 race)
optimizer                        = adamw
scheduler                        = cosine
weight_decay                     = 0.1
max_grad_norm                    = 1.0

bf16                             = 1
amp                              = 0
grad_scaler                      = 0

log_interval                     = 10

async_muon                       = 0
sgp_enabled                      = 0

save                             = scripts/race/results/cpp_ckpt/model.pt

[optimization]
fused                            = 0
foreach_optimizer                = 1
gpu_data                         = 0          # stream from disk — corpus won't fit in 16 GB
cuda_graph                       = 0          # graph pool won't fit in 16 GB; off here
zero1                            = 0
mup                              = 0

[data]
data_path                        = data/race_tokens.npy
bpe_vocab                        = data/gpt2/vocab.json

[device]
device                           = cuda
