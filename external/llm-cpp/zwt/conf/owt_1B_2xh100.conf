# Zero-Wait Trainer — 1B OpenWebText pretraining, 2x H100 80 GB DDP.
#
# Sister of conf/owt_1B_h100.conf. Same model. The only differences:
#   * grad_accum halved (32 -> 16) so the effective global batch stays
#     B*S*grad_accum*world = 2 * 2048 * 16 * 2 = 131,072 tokens/step,
#     matching the single-GPU preset and the 3B preset.
#   * [dist] section enables 2-rank NCCL DDP via launch_ddp.sh. World size
#     and bucket size are also overridable from env vars (RANK, WORLD_SIZE,
#     MASTER_ADDR, MASTER_PORT) so the same conf can drive a smoke run on
#     four ranks if you have the GPUs.
#
# Memory budget per rank (each rank has its own 80 GB H100):
#   params   2*1.0B   =  2.0 GB
#   grads    4*1.0B   =  4.0 GB    (fp32 master grads, BucketManager owns them)
#   m,v      8*1.0B   =  8.0 GB    (fp32 AdamW moments)
#   bucket buffers    ~ 4.0 GB    (sized to fit each rank's grads in one or
#                                  two 256-MiB buckets; total ~= grads)
#   activations + scratch ~ 20 GB at micro_batch=4 seq=2048 with arena=32 GiB
# leaves > 30 GB headroom — room to push B=4 if you want a larger effective
# batch later.
#
# Effective batch = batch_size * grad_accum * seq_len * world_size
#                 = 2 * 16 * 2048 * 2 = 131,072 tokens/step.

[model]
vocab_size     = 50257
d_model        = 2048
n_heads        = 16
# Grouped-Query Attention: 4 KV heads, 4 Q-heads per KV head. Llama-3 / OLMo-2
# layout. Today the attention path materializes replicated K/V before SDPA
# (task #16); the PyTorch baseline does the same repeat_interleave so the
# benchmark stays apples-to-apples.
n_kv_heads     = 4
head_dim       = 128
d_ffn          = 5632
n_layers       = 16
max_seq        = 2048
rope_base      = 10000
norm_eps       = 1e-5
bias           = false
tie_embeddings = false

[data]
path           = data/owt/owt_tokens.npy
seq_len        = 2048
batch_size     = 2
grad_accum     = 16
seed           = 0xC0FFEE
shuffle        = true

[optim]
lr             = 3e-4
beta1          = 0.9
beta2          = 0.95
eps            = 1e-8
weight_decay   = 0.1
grad_clip      = 1.0
peak_lr        = 3e-4
min_lr         = 3e-5
warmup_steps   = 2000
max_steps      = 50000

[runtime]
max_steps      = 50000
log_interval   = 10
ckpt_interval  = 1000
ckpt_path      = ckpts/owt_1B_2xh100.bin
resume_from    =
init_seed      = 0xC0DEBA5E
arena_mb       = 32768

[dist]
# Override via env vars set by launch_ddp.sh:
#   RANK, LOCAL_RANK, WORLD_SIZE, MASTER_ADDR, MASTER_PORT
# Defaults below are what you get if you accidentally run the binary
# directly without the wrapper — single rank, NCCL inactive.
rank        = 0
local_rank  = 0
world_size  = 2
master_addr = 127.0.0.1
master_port = 29500
# 256 MiB matches the BucketManager default. At 1B grads on NVLink the
# allreduce is bandwidth-bound; finer buckets just add ring trips.
bucket_mb   = 256
