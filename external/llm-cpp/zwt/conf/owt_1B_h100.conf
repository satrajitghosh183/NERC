# Zero-Wait Trainer — 1B OpenWebText pretraining config, single H100.
#
# Target: beat tuned-PyTorch on one H100 80 GB by widening the micro-batch
# that our low-overhead path can feed the GPU.
#
# Parameters: ~1.0 B total (OLMo-1B-ish)
#   emb:      50257 * 2048              ~ 103 M
#   per blk:  4*d_model^2 + 3*d_model*d_ffn
#             4*2048^2 + 3*2048*5632    ~  51 M
#   16 blks:                            ~ 816 M
#   lm_head:                            ~ 103 M
#
# Memory budget (H100 80 GB):
#   params   2*1.0B =  2.0 GB
#   grads    4*1.0B =  4.0 GB
#   m,v      8*1.0B =  8.0 GB   (fp32 AdamW moments)
#   total              14.0 GB  persistent
#   activations + scratch ~ 20 GB at micro_batch=4 seq=2048
#   leaves >40 GB headroom — room for batch_size=8 if you want longer runs.
#
# Effective batch = batch_size * grad_accum * seq_len
#                 = 2 * 32 * 2048 = 131,072 tokens/step (same as 3B preset).

[model]
vocab_size     = 50257
d_model        = 2048
n_heads        = 16
# Grouped-Query Attention: 4 KV heads, 4 Q-heads per KV head. Matches the
# Llama-3 / OLMo-2 family. Cuts K/V params by 4x and K/V activation memory
# by 4x in the compact buffers (pre-replication). The current attention
# path still materializes replicated K/V for sdpa; a native-GQA FlashAttn
# kernel (task #16) will remove that materialization.
n_kv_heads     = 4
head_dim       = 128
d_ffn          = 5632
n_layers       = 16
max_seq        = 2048
rope_base      = 10000
norm_eps       = 1e-5
bias           = false
tie_embeddings = false

[data]
path           = data/owt/owt_tokens.npy
seq_len        = 2048
# B=4 overflowed the 32 GiB activation arena: each block keeps the
# pre-softmax scores AND the softmax output (~1 GiB combined at B=4 H=16
# S=2048) plus FFN intermediates, none of which free until step_end.
# B=2 halves all activations and stays under the arena.
batch_size     = 2
grad_accum     = 32
seed           = 0xC0FFEE
shuffle        = true

[optim]
lr             = 3e-4
beta1          = 0.9
beta2          = 0.95
eps            = 1e-8
weight_decay   = 0.1
grad_clip      = 1.0
peak_lr        = 3e-4
min_lr         = 3e-5
warmup_steps   = 2000
max_steps      = 50000

[runtime]
max_steps      = 50000
log_interval   = 10
ckpt_interval  = 1000
ckpt_path      = ckpts/owt_1B.bin
resume_from    =
init_seed      = 0xC0DEBA5E
# Activation scratch budget. At B=4 S=2048 each block stores ~1 GiB of
# bf16 attention scores plus ~400 MiB of FFN activations for backward,
# and scratch accumulates across the full forward pass before step_begin
# resets it. 16 blocks * ~1.5 GiB/block ≈ 24 GiB. 32 GiB gives headroom.
# Persistent budget is ~14 GiB (params+grads+m,v), so 32 GiB arena still
# leaves ~30 GiB free on an H100 80 GB for CUDA context + cublas + spikes.
arena_mb       = 32768
