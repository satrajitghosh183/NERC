# 1B profiling config — short, no checkpoints, no real training.
#
# Same model shape as owt_1B_h100.conf so the kernel mix is identical,
# but runs 50 optimizer steps (~3 min) and skips checkpointing so the
# nsys trace captures steady-state forward/backward/step only.
#
# Use with:  bash zwt/scripts/profile_1b.sh

[model]
vocab_size     = 50257
d_model        = 2048
n_heads        = 16
n_kv_heads     = 4        # match owt_1B_h100.conf (GQA group size 4)
head_dim       = 128
d_ffn          = 5632
n_layers       = 16
max_seq        = 2048
rope_base      = 10000
norm_eps       = 1e-5
bias           = false
tie_embeddings = false

[data]
path           = data/owt/owt_tokens.npy
seq_len        = 2048
batch_size     = 2
grad_accum     = 32
seed           = 0xC0FFEE
shuffle        = true

[optim]
lr             = 3e-4
beta1          = 0.9
beta2          = 0.95
eps            = 1e-8
weight_decay   = 0.1
grad_clip      = 1.0
peak_lr        = 3e-4
min_lr         = 3e-5
warmup_steps   = 2000
max_steps      = 50
# we'll intentionally run past warmup-start with just a handful of steps

[runtime]
# 35 steps = 5 graph-capture warmup + 30 measured (matches bench_threeway).
max_steps      = 35
# log_interval=5 → loss is D2H-pulled at steps 1, 5, 10, 15, 20, 25, 30, 35.
# At log_interval=1 we'd pay a cudaMemcpy + host sync per outer step,
# which negates the point of capturing the inner loop in a CUDA graph.
log_interval   = 5
ckpt_interval  = 0        # never checkpoint during profiling
ckpt_path      =
resume_from    =
init_seed      = 0xC0DEBA5E
arena_mb       = 32768
