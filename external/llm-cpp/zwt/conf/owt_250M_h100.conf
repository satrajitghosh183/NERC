# zwt — OLMo-2-300M-class pretraining on single H100, OpenWebText.
# Used by scripts/race_250M.sh as the zwt entry of the 3-way race
# (olmo_train, zwt_pretrain, olmo-python).
#
# Architecture mirrors conf/olmo_250M.conf so the cross-stack comparison is
# apples-to-apples on shape:
#   d_model=896  n_heads=14  n_kv_heads=2  head_dim=64
#   d_ffn=2432  (~ 8/3 * d_model rounded to multiple of 64; SwiGLU)
#   n_layers=24  max_seq=4096  vocab=50257 (GPT-2 tokenizer; matches data)
#
# Effective batch = batch_size * grad_accum * seq_len
#                 = 4 * 8 * 4096 = 131,072 tokens/step
#
# Memory at bf16 (H100 80 GB):
#   params  ~290 M * 2 =  ~0.6 GB
#   grads             =  ~1.2 GB (fp32)
#   m,v               =  ~2.4 GB (fp32 AdamW)
#   activations       = ~16 GB at B=4 S=4096 with arena reset per step
#   plenty of headroom; could push to B=8 if we want shorter epochs.

[model]
vocab_size     = 50257
d_model        = 896
n_heads        = 14
n_kv_heads     = 2
head_dim       = 64
d_ffn          = 2432
n_layers       = 24
max_seq        = 4096
rope_base      = 500000
norm_eps       = 1e-6
bias           = false
tie_embeddings = true

[data]
path           = data/owt/owt_tokens.npy
seq_len        = 4096
batch_size     = 4
grad_accum     = 8
seed           = 0xC0FFEE
shuffle        = true

[optim]
lr             = 3e-4
beta1          = 0.9
beta2          = 0.95
eps            = 1e-8
weight_decay   = 0.1
grad_clip      = 1.0
peak_lr        = 3e-4
min_lr         = 3e-5
warmup_steps   = 200
max_steps      = 5000

[runtime]
max_steps      = 5000
log_interval   = 10
ckpt_interval  = 1000
ckpt_path      = ckpts/owt_250M_zwt.bin
resume_from    =
init_seed      = 0xC0DEBA5E
arena_mb       = 16384

[dist]
# Bucket sizing for 2× H100 NVLink. The 1B preset uses 256 MiB because at
# 4 GiB of fp32 grads that gives ~16 buckets. For 250M (~1.2 GiB grads),
# 256 MiB → 5 buckets, which under-overlaps backward with allreduce. 64 MiB
# → ~19 buckets — closer to the comm/compute pipeline's sweet spot on
# NVLink and matches what NCCL benchmarks recommend for this param scale.
bucket_mb      = 64
