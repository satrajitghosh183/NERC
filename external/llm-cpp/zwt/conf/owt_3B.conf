# Zero-Wait Trainer — 3B OpenWebText pretraining config.
#
# Parameters: ~3.25 B total
#   emb:      50257 * 3072              ~ 154 M
#   per blk:  4*d_model^2 + 3*d_model*d_ffn
#             4*3072^2 + 3*3072*8192    ~ 113 M
#   26 blks:                            ~ 2.95 B
#   lm_head:                            ~ 154 M
#
# Hardware target: single H100 80 GB. BF16 params + FP32 master grads + fp32
# optimizer state (m, v) → roughly:
#   params   2*3.25B =  6.5 GB
#   grads    4*3.25B = 13.0 GB
#   m,v      8*3.25B = 26.0 GB
#   total              45.5 GB  (leaving ~34 GB for activations + kvcache)
#
# With seq=2048, micro-batch=1, grad_accum=64 the effective batch is 128 K
# tokens/step and the activation footprint stays under 30 GB.

[model]
vocab_size     = 50257
d_model        = 3072
n_heads        = 24
head_dim       = 128
d_ffn          = 8192
n_layers       = 26
max_seq        = 2048
rope_base      = 10000
norm_eps       = 1e-5
bias           = false
tie_embeddings = false

[data]
path           = data/owt/owt_tokens.npy
seq_len        = 2048
batch_size     = 1
grad_accum     = 64
seed           = 0xC0FFEE
shuffle        = true

[optim]
# AdamW with LLaMA/OLMo-style hyperparameters.
lr             = 3e-4
beta1          = 0.9
beta2          = 0.95
eps            = 1e-8
weight_decay   = 0.1
grad_clip      = 1.0
# Cosine schedule — peak_lr defaults to [optim].lr if unset.
peak_lr        = 3e-4
min_lr         = 3e-5
warmup_steps   = 2000
max_steps      = 50000

[runtime]
max_steps      = 50000
log_interval   = 10
ckpt_interval  = 1000
ckpt_path      = ckpts/owt_3B.bin
resume_from    =
init_seed      = 0xC0DEBA5E
arena_mb       = 4096
