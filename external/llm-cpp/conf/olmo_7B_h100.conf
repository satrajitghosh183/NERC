# olmo_7B_h100.conf — 7B param model for H100
# Requires multi-GPU or gradient accumulation for full training

[model]
d_model			4096
vocab_size		50257
n_layers		32
n_heads			32
n_kv_heads		8		# GQA: 4x fewer KV heads
head_dim		-1		# auto = 128
rope_theta		500000
layer_norm_eps		1e-6
init_std		0.006		# 1/sqrt(d_model) ≈ 0.0156, use smaller for stability
hidden_size_multiple_of	256
hidden_size_multiplier	1.5		# FFN hidden = 4096 * 1.5 = 6144, rounded up to 6144
use_qk_norm		1
use_head_qk_norm	0
layer_norm_type		fused_rms_norm

# Block / attention
block_type		reordered_norm
attention_backend	sdpa
gated_attention		none
sliding_window_size	-1

# RoPE
rope_scaling_type	none
rope_scaling_factor	1.0

# Multi-token prediction
num_mtp_heads		2
mtp_loss_weight		0.1

# Activation checkpointing — selective: checkpoint every 2nd layer
# Saves ~50% activation memory vs none, costs ~25% more compute vs none
# but allows batch=4 which more than compensates via GPU saturation
activation_checkpoint_mode	selected_blocks
activation_checkpoint_interval	2

# Float8
use_float8		0

# Convolution
use_conv		0

# MoE (disabled for dense 7B)
use_moe			0

# DC-MRE
multi_res_char_buckets	4096
multi_res_phrase_buckets	8192
multi_res_inner_dim	64

[training]
steps			50000
batch_size		2		# B=4 OOMs on 80GB H100: static state (W+G+Muon momentum, BF16) = ~49GB leaves only ~30GB for activations, and 16 non-checkpointed fused blocks cost ~24GB alone. B=2 halves activations.
seq_len			2048
lr			3e-4
warmup_steps		2000
grad_accum		16		# effective batch = 2 * 16 = 32 (preserves global token budget)
optimizer		muon
scheduler		cosine
amp			0
bf16			1		# pure BF16: halves weight/optimizer/gradient memory (~93GB→~47GB)
grad_scaler		0
max_grad_norm		1.0
weight_decay		0.01
seed			42
profile			1
log_interval		10
save			checkpoints/7B_h100.pt

# Heartbeat monitoring
report_every		300		# write heartbeat every ~300s (5 min)
heartbeat_path		heartbeat_7B.txt

# Evaluation
eval_interval		1000

# Checkpointing
checkpoint_interval	5000
keep_checkpoints	3

# Curriculum scheduling (disabled)
target_seq_len		-1
seq_len_warmup_steps	0
target_batch_size	-1
batch_size_ramp_steps	0

[data]
data_path		/media/volume/Prep_and_Voice_Training/data/openwebtext_gpt2.npy
bpe_vocab		/media/volume/Prep_and_Voice_Training/data/gpt2/vocab.json

[optimization]
fused			1
mup			1
multi_res		1
foreach_optimizer	1
gpu_data		0		# keep data on CPU — GPU memory needed for 8.2B params + optimizer
gpu_data_max_tokens	0
cuda_graph		0		# graph capture needs extra VRAM headroom, skip for 7B

[device]
device			cuda
