# olmo_125M_full.conf — 125M param model, all optimizations enabled
# Tuned for GTX 3060 (12 GB VRAM)
# Same as olmo_125M.conf but with profile enabled and comments on every knob

[model]
d_model			768
vocab_size		50257
n_layers		12
n_heads			12
n_kv_heads		4		# GQA: 4 KV heads (3x less KV memory vs 12)
head_dim		-1		# auto = d_model / n_heads = 64
rope_theta		500000
layer_norm_eps		1e-6
init_std		0.02
hidden_size_multiple_of	256
hidden_size_multiplier	1.5
use_qk_norm		1		# query normalization for stable training
use_head_qk_norm	0		# per-head QK norm (off — mainly for very large GQA)
layer_norm_type		fused_rms_norm	# uses custom CUDA kernel
block_type		reordered_norm	# options: reordered_norm, peri_norm, normalized_ngpt, layer_norm_scaled
attention_backend	sdpa		# options: sdpa, flash2, flash3, transformer_engine
gated_attention		none		# options: none, headwise, elementwise
sliding_window_size	-1		# -1 = full attention
rope_scaling_type	none		# options: none, abf, position_interpolation, stepwise, yarn
rope_scaling_factor	1.0
num_mtp_heads		2		# multi-token prediction heads (0 = disabled)
mtp_loss_weight		0.1		# weight for MTP auxiliary loss
activation_checkpoint_mode	selected_blocks	# options: none, full, selected_blocks
activation_checkpoint_interval	2		# checkpoint every 2nd block
use_float8		0		# fp8 quantization (needs Hopper/Ada GPU)
use_conv		0		# convolution layers
use_moe			0		# mixture of experts

[training]
steps			10000
batch_size		2		# small for 12 GB VRAM
seq_len			512
lr			3e-4
warmup_steps		200
grad_accum		4		# effective batch = 2 * 4 = 8
optimizer		muon		# options: adamw, muon, lion, dion
scheduler		cosine		# options: cosine, linear, constant, wsd
amp			1		# mixed precision (halves activation memory)
max_grad_norm		1.0
weight_decay		0.01
seed			42
profile			1		# print timing + memory report at end
log_interval		10
save			checkpoints/125M_full.pt

[data]
data_path		data/tinystories_gpt2.npy
bpe_vocab		data/gpt2/vocab.json

[optimization]
fused			1		# fused QKV + gate_up + attention
mup			1		# muP width-scaled initialization
multi_res		1		# DC-MRE multi-resolution embeddings
foreach_optimizer	1		# batched _foreach_ optimizer ops
gpu_data		0		# 0 = stream from CPU (safe for 12 GB cards)
gpu_data_max_tokens	0		# 0 = auto budget; -1 = never GPU-resident

[device]
device			auto
