# olmo_350M.conf — GPT-2 Medium scale, full optimization stack
# ~345M params: d=1024, 24 layers, 16 heads

[model]
d_model	1024
vocab_size	50257
n_layers	24
n_heads	16
n_kv_heads	-1
head_dim	-1
rope_theta	500000
layer_norm_eps	1e-6
init_std	0.02
use_qk_norm	1
num_mtp_heads	2
mtp_loss_weight	0.1

[training]
steps	20000
batch_size	64
seq_len	1024
lr	3e-4
warmup_steps	500
grad_accum	4
optimizer	muon
amp	0
seed	42
profile	0
save	checkpoints/350M.pt

[data]
data_path	data/tinystories_gpt2.npy
bpe_vocab	data/gpt2/vocab.json

[optimization]
fused	1
mup	1
multi_res	1

[device]
device	auto
