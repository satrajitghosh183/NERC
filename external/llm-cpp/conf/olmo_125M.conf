# olmo_125M.conf — 125M param model, all optimizations enabled
# Tuned for GTX 3060 (12 GB VRAM)

[model]
d_model			768
vocab_size		50257
n_layers		12
n_heads			12
n_kv_heads		4
head_dim		-1
rope_theta		500000
layer_norm_eps		1e-6
init_std		0.02
hidden_size_multiple_of	256
hidden_size_multiplier	1.5

# Normalization
use_qk_norm		1
use_head_qk_norm	0
layer_norm_type		fused_rms_norm

# Block / attention
block_type		reordered_norm
attention_backend	sdpa
gated_attention		none
sliding_window_size	-1

# RoPE
rope_scaling_type	none
rope_scaling_factor	1.0

# Multi-token prediction
num_mtp_heads		2
mtp_loss_weight		0.1

# Activation checkpointing — checkpoint every 2nd block to halve peak VRAM
activation_checkpoint_mode	selected_blocks
activation_checkpoint_interval	2

# Float8 quantization (disable on 3060 — limited fp8 hardware support)
use_float8		0

# Convolution
use_conv		0

# MoE (disabled for 125M dense model)
use_moe			0

# DC-MRE multi-resolution embedding
multi_res_char_buckets	4096
multi_res_phrase_buckets	8192
multi_res_inner_dim	64

[training]
steps			10000
batch_size		2
seq_len			512
lr			3e-4
warmup_steps		200
grad_accum		4
optimizer		muon
scheduler		cosine
amp			1
grad_scaler		0
max_grad_norm		1.0
weight_decay		0.01
seed			42
profile			0
log_interval		10
save			checkpoints/125M.pt

# Activation checkpointing (training-level interval, 0 = use model-level setting)
activation_checkpoint_interval	0

# Evaluation
eval_interval		500

# Checkpointing
checkpoint_interval	2000
keep_checkpoints	3

# Curriculum scheduling (disabled)
target_seq_len		-1
seq_len_warmup_steps	0
target_batch_size	-1
batch_size_ramp_steps	0

[data]
data_path		data/tinystories_gpt2.npy
bpe_vocab		data/gpt2/vocab.json

[optimization]
fused			1
mup			1
multi_res		1
foreach_optimizer	1
gpu_data		0
gpu_data_max_tokens	0

[device]
device			auto
