# olmo.conf — single config for training, model, data, and optimization.
# Usage: ./build/olmo_train conf/olmo.conf

[model]
d_model	256
vocab_size	50257
n_layers	4
n_heads	8
n_kv_heads	-1
head_dim	-1
rope_theta	500000
layer_norm_eps	1e-6
init_std	0.02
use_qk_norm	1
num_mtp_heads	0
mtp_loss_weight	0.1

[training]
steps	5000
batch_size	4
seq_len	256
lr	3e-4
warmup_steps	100
grad_accum	1
optimizer	adamw       # adamw, muon, lion, dion
amp	0
seed	42
profile	0
save	checkpoints/model.pt

[data]
data_path	data/tinystories_gpt2.npy
bpe_vocab	data/gpt2/vocab.json

[optimization]
fused	1               # fused QKV + fused gate_up FFN
mup	1               # maximal update parameterization
multi_res	1           # dual-codebook multi-resolution embedding (DC-MRE)

[device]
device	auto            # auto, cpu, mps, cuda
