# ============================================================================
# conf/quickstart_3060.conf
#
# A 30M-parameter transformer pre-tuned for an NVIDIA RTX 3060 (12 GB) on
# Linux running TinyStories. Same architecture family as conf/olmo.conf but
# explicitly sized to fit comfortably in ~3 GB VRAM with profile=1 enabled
# so every training stage gets timed.
#
# Run with:
#   ./build/olmo_train conf/quickstart_3060.conf
# See QUICKSTART.md for the full six-command end-to-end recipe.
#
# Outputs:
#   checkpoints/quickstart_3060.pt       — final model weights
#   logs/train.log                       — stdout copy with profile table
#
# Profile table prints once at end of training and breaks down:
#   step_total / data_loading / forward / backward /
#   allreduce  / optimizer_step
# along with per-region GPU memory peaks.
# ============================================================================

[model]
# 256-dim, 4 layer, 8 heads ≈ 30M params with GPT-2 50257 vocab.
d_model            256
vocab_size         50257
n_layers           4
n_heads            8
n_kv_heads         -1          # -1 means "same as n_heads" (no GQA)
head_dim           -1          # -1 means d_model / n_heads
rope_theta         500000
layer_norm_eps     1e-6
init_std           0.02
use_qk_norm        1           # query/key RMSNorm — stabilises training
num_mtp_heads      0           # disable MTP for the simplest learning curve
mtp_loss_weight    0.1

[training]
steps              2000        # ~10 minutes on a 3060 — long enough to
                                # see loss decrease but short enough for a
                                # demo. Bump to 20000+ for real training.
batch_size         8           # fits in 12 GB easily
seq_len            256
lr                 3e-4
warmup_steps       100
grad_accum         1
optimizer          adamw       # adamw, muon, lion, dion
amp                0           # off — keep numerics deterministic for inspection
seed               42
profile            1           # <-- always-on profiler, prints table at end
log_interval       10          # heartbeat every 10 steps
save               checkpoints/quickstart_3060.pt
checkpoint_dir     checkpoints/quickstart_3060
checkpoint_interval 500
keep_checkpoints   2

[data]
# Tokenize TinyStories first with prepare_data (see QUICKSTART.md step 3).
data_path          data/tinystories_gpt2.npy
bpe_vocab          data/gpt2/vocab.json

[optimization]
fused              1           # use FusedTransformer (fused QKV + gate_up)
mup                0           # µP off — easier to reason about a vanilla model
multi_res          0           # DC-MRE off — see plain Embedding matrix

[device]
device             auto         # auto-detects CUDA on a 3060
