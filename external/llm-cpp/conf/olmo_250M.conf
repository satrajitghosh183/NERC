# olmo_250M.conf — OLMo-2-300M-class, used for the from-scratch race
# (scripts/race_250M.sh). Architecture mirrors OLMo-2 small-class:
# d_model=896, 24 layers, 14 heads (head_dim=64), GQA n_kv_heads=2.
# vocab kept at 50257 to match GPT-2-tokenized OWT/TinyStories data so
# the head-to-head vs olmo-python is apples-to-apples on the data side.
# Approximate param count (tied embeddings):
#   embed   50257 * 896                  ~= 45.0M
#   per-layer:
#     QKV   896 * (14+2+2)*64 = 896*1152 ~=  1.03M
#     out   896 * 896                    ~=  0.80M
#     SwiGLU FFN (4x hidden, 3 mats)
#           3 * 896 * (4*896)            ~=  9.63M
#     norms                              ~=  ~0
#     subtotal                           ~= 11.5M
#   24 layers                            ~= 275M
#   total (tied)                         ~= 290M

[model]
d_model	896
vocab_size	50257
n_layers	24
n_heads	14
n_kv_heads	2
head_dim	64
rope_theta	500000
layer_norm_eps	1e-6
init_std	0.02
use_qk_norm	1
num_mtp_heads	0
mtp_loss_weight	0.0

[training]
# steps is a placeholder — the race orchestrator overrides this with
# whatever fits the configured wall-clock budget. Default here gives a
# single-H100 run of a few hours useful for tuning.
steps	5000
batch_size	8
seq_len	4096
lr	3e-4
warmup_steps	200
grad_accum	4
optimizer	muon
amp	0
seed	42
profile	0
save	checkpoints/250M.pt

[data]
data_path	data/owt/owt_tokens.npy
bpe_vocab	data/gpt2/vocab.json

[optimization]
fused	1
mup	1
multi_res	0

[device]
device	auto
