# benchmark_125M.conf — 125M param model for C++ vs Python benchmarking
# Uses AdamW (foreach-optimized) to benchmark the optimizer improvements
# Matches Python benchmark script exactly: same arch, batch, seq_len, steps

[model]
d_model	768
vocab_size	50257
n_layers	12
n_heads	12
n_kv_heads	-1
head_dim	-1
rope_theta	500000
layer_norm_eps	1e-6
init_std	0.02
use_qk_norm	1
num_mtp_heads	0
mtp_loss_weight	0.0

[training]
steps	100
batch_size	8
seq_len	512
lr	3e-4
warmup_steps	10
grad_accum	1
optimizer	adamw
amp	1
seed	42
profile	1
log_interval	10

[data]
data_path	DATA_PATH_PLACEHOLDER

[optimization]
fused	1
mup	0
multi_res	0
foreach_optimizer	1
gpu_data	1

[device]
device	cuda
