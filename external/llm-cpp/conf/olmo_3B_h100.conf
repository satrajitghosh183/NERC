# olmo_3B_h100.conf — 3B-scale model tuned for single H100 (80 GB)
# ~3.6B params: d=3072, 24 layers, 24 heads, GQA(kv=8)
# Designed for the speed-xp-sg plan: fits without activation checkpointing so
# CUDA graphs, async Muon, and SGP can all be enabled cleanly.

[model]
d_model			3072
vocab_size		50257
n_layers		24
n_heads			24
n_kv_heads		8		# GQA: 3x fewer KV heads
head_dim		-1		# auto = 128
rope_theta		500000
layer_norm_eps		1e-6
init_std		0.008
hidden_size_multiple_of	256
hidden_size_multiplier	1.5		# FFN hidden = 8/3 * 3072 * 1.5 = 12288
use_qk_norm		1
use_head_qk_norm	0
layer_norm_type		fused_rms_norm

block_type		reordered_norm
attention_backend	sdpa
gated_attention		none
sliding_window_size	-1

rope_scaling_type	none
rope_scaling_factor	1.0

num_mtp_heads		2
mtp_loss_weight		0.1

# NO activation checkpointing — 3B fits without it on H100, and ckpt breaks
# CUDA-graph capture (custom autograd Function is not graph-safe).
activation_checkpoint_mode	none
activation_checkpoint_interval	1

use_float8		0
use_conv		0
use_moe			0

multi_res_char_buckets	4096
multi_res_phrase_buckets	8192
multi_res_inner_dim	64

[training]
steps			50000
batch_size		4		# static ~22GB + ~20GB acts = ~45GB peak, leaves room for CUDA-graph pool
seq_len			2048
lr			3e-4
warmup_steps		2000
grad_accum		8		# effective batch = 32
optimizer		muon
scheduler		cosine
amp			0
bf16			1		# pure BF16 master weights
grad_scaler		0
max_grad_norm		1.0
weight_decay		0.01
seed			42
profile			1
log_interval		10
save			checkpoints/3B_h100.pt

report_every		300
heartbeat_path		heartbeat_3B.txt

eval_interval		1000
grad_stats_path		logs/grad_stats_3B.csv
grad_stats_interval	10
checkpoint_interval	5000
keep_checkpoints	3

target_seq_len		-1
seq_len_warmup_steps	0
target_batch_size	-1
batch_size_ramp_steps	0

[data]
data_path		/media/volume/Prep_and_Voice_Training/data/openwebtext_gpt2.npy
bpe_vocab		/media/volume/Prep_and_Voice_Training/data/gpt2/vocab.json

[optimization]
fused			1
mup			1
multi_res		1
foreach_optimizer	1
gpu_data		0
gpu_data_max_tokens	0
cuda_graph		1		# enabled: no activation ckpt means the forward is graph-safe
async_muon		1		# NS orthogonalization on side CUDA stream, 1-step stale

# ── Speculative Gradient Prediction (SGP) ──
# Set sgp=1 to enable. sgp_version=1 → linear predictor (cheap, works everywhere).
# sgp_version=2 → rank-r subspace predictor (uses truncated randomized SVD on
# large 2D params, falls back to linear for 1D/small params).
# K adapts: starts at sgp_initial_k, grows up to sgp_max_k when prediction error
# is low, shrinks when error is high. No skipping during the warmup window.
sgp			0
sgp_version		1
sgp_initial_k		2
sgp_max_k		6
sgp_warmup_steps	200
sgp_rank		4		# only used when sgp_version=2

[device]
device			cuda
