# conf/usable_1B.conf — ~1B general LM, multi-day run on 2x H100 -> usable model.
#
# Goal: a base model you can prompt with quiz-style questions (few-shot /
# completion style, e.g. "Q: ... A:"). General web text (OpenWebText).
#
# SPEED-FIRST 1B on 2x H100 (DDP). Levers vs the reliability default:
#   - num_mtp_heads=0  -> pure next-token LM: ~30% fewer FLOPs AND lets CUDA
#                         graphs fit (MTP LM heads OOM the graph pool).
#   - cuda_graph = 1   -> eliminates per-kernel launch overhead (the big lever).
#   - batch_size = 16  -> bigger micro-batch = higher H100 MFU.
#   Plus the multi-day essentials: checkpoint_dir (resumable model+opt+step),
#   resume=1 (relaunch after a crash), latest.pt every ckpt (chat mid-run).
#   steps=120000 x (16 x 2048 x accum 2 x 2 GPUs) = ~15.7B tokens.
#   Expect a big jump over the old ~50k tok/s — watch for "CUDA Graph: captured".
#   ( fused=1 is the last ~1.2x but needs resume wired into the fused path — later. )
#
# Launch (2 GPUs):   ./scripts/launch_multigpu.sh conf/usable_1B.conf 2
# After a crash:     same command — resume=1 picks up the latest checkpoint.

[model]
d_model				2048
vocab_size			50304
n_layers			16
n_heads				16
n_kv_heads			8
head_dim			128
rope_theta			500000
layer_norm_eps			1e-5
init_std			0.02

hidden_size_multiplier		1.0
hidden_size_multiple_of		256

use_qk_norm			1		# OLMo-2's key stability+quality win; graph-safe; ~free
use_head_qk_norm		0
block_type			reordered_norm
attention_backend		sdpa
gated_attention			none
sliding_window_size		-1
rope_scaling_type		none
layer_norm_type			rms_norm
use_float8			0
use_conv			0
use_moe				0
multi_res			0

num_mtp_heads			0		# 0 = pure next-token LM: ~30% fewer FLOPs AND unblocks
mtp_loss_weight			0.1		# CUDA graphs (MTP LM heads OOM the graph pool).

activation_checkpoint_mode	none
activation_checkpoint_interval	1

[training]
steps				120000
batch_size			16		# bigger micro-batch = higher MFU; drop to 8 if OOM
seq_len				2048
lr				3.0e-4
warmup_steps			2000
grad_accum			2		# effective batch = 32 per GPU
optimizer			adamw
scheduler			cosine		# warmup -> cosine decay to ~0 (essential for a usable model)
weight_decay			0.1
max_grad_norm			1.0

bf16				1
amp				0
grad_scaler			0

profile				0		# off for the long run (less log noise); flip to 1 to inspect
log_interval			50

# Outputs on the 400GB root disk (relative to repo cwd). 1B ckpt ~2-4GB each.
save				runs/usable_1B/model.pt
checkpoint_dir			runs/usable_1B/checkpoints
checkpoint_interval		2000		# ~every 1.5h; resumable; also writes latest.pt
keep_checkpoints		3
resume				1		# relaunch after a crash -> continue
report_every			300
heartbeat_path			runs/usable_1B/heartbeat.txt

[optimization]
fused				0
foreach_optimizer		1
gpu_data			0		# stream the corpus from disk (rank-sharded)
cuda_graph			1		# ENABLED: no MTP -> graph fits -> kills launch overhead (~1.5-2x)
zero1				0
fsdp				0		# 1B fits one GPU -> DDP, no sharding needed
mup				0

[data]
# Built by: ./scripts/prepare_web_data.sh   (downloads C4 + tokenizes -> data/web.npy)
data_path			data/web.npy
bpe_vocab			data/gpt2/vocab.json

[device]
device				cuda
