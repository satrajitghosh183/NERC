# conf/olmo_3B_h100_adamw.conf — ~2.8B model, AdamW + fp32 master, single H100.
#
# The "fixed optimizer" 3B: AdamW with the fp32-master-weights path (stable bf16)
# instead of the Muon used by olmo_3B_h100.conf.
#
# IMPORTANT memory reality: AdamW + fp32 master costs ~20 bytes/param
#   (bf16 param 2 + fp32 master 4 + 2 fp32 moments 8 + fp32 grad buf 4 + bf16 grad 2).
#   The full 3.6B Muon config does NOT fit one H100 under AdamW (~72 GB of state).
#   So this is a TRUE ~2.8B (d=2560 / 36 layers) with activation checkpointing:
#     opt+params ~56 GB + checkpointed activations ~8 GB + CE/overhead ~5 GB ≈ 70 GB.
#   Fits 80 GB with headroom. If it OOMs, drop batch_size 2->1 or n_layers 36->32.
#   For the full 3.6B at AdamW precision, use 2x H100 + FSDP (the multi-GPU path).
#
# cuda_graph is OFF here: activation checkpointing's custom autograd Function is
# not graph-capture-safe (same note as the Muon 3B config).

[model]
d_model				2560
vocab_size			50304
n_layers			36
n_heads				20
n_kv_heads			4		# GQA: 5x fewer KV heads
head_dim			128
rope_theta			500000
layer_norm_eps			1e-5
init_std			0.014		# ~1/sqrt(d_model/512) scaled

hidden_size_multiplier		1.0
hidden_size_multiple_of		256		# ffn ≈ 6912

use_qk_norm			0
use_head_qk_norm		0
block_type			reordered_norm
attention_backend		sdpa
gated_attention			none
sliding_window_size		-1
rope_scaling_type		none
layer_norm_type			rms_norm
use_float8			0
use_conv			0
use_moe				0
multi_res			0

num_mtp_heads			3
mtp_loss_weight			0.1

# Activation checkpointing ON — required to fit the activations alongside the
# ~56 GB of AdamW+fp32-master state on one H100.
activation_checkpoint_mode	full
activation_checkpoint_interval	1

[training]
steps				50000
batch_size			2		# 1 if it OOMs
seq_len				2048
lr				2.0e-4
warmup_steps			2000
grad_accum			16		# effective batch = 32
optimizer			adamw
scheduler			cosine
weight_decay			0.1
max_grad_norm			1.0

bf16				1
amp				0
grad_scaler			0

profile				1
log_interval			10

# ALL outputs on the VOLUME — a 2.8B checkpoint is ~5.6 GB.
save				/media/volume/Prep_and_Voice_Training/runs/3B/model.pt
checkpoint_interval		5000
keep_checkpoints		2
report_every			300
heartbeat_path			/media/volume/Prep_and_Voice_Training/runs/3B/heartbeat.txt

[optimization]
fused				0
foreach_optimizer		1
gpu_data			0
cuda_graph			0		# act-ckpt is not graph-safe
zero1				0
mup				0

[data]
data_path			/media/volume/Prep_and_Voice_Training/data/openwebtext_gpt2.npy
bpe_vocab			/media/volume/Prep_and_Voice_Training/data/gpt2/vocab.json

[device]
device				cuda
