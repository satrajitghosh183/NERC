# conf/olmo_1B_h100.conf — ~1B model for a single H100 (80 GB).
#
# Bridges the 350M race model and the existing 3B config. Uses AdamW (so the
# fp32-master + batched-upcast optimizer path applies) rather than the 3B's
# Muon, and the same OpenWebText data already on the media volume.
#
# Param count: d=2048, 16 layers, GQA(kv=8), ffn≈5632, vocab 50304
#   embed+lm_head 2*50304*2048      = 206 M
#   16 * (q 2048^2 + k/v 2*2048*1024 + out 2048^2 + 3*2048*5632 + norms)
#                                    ≈ 16 * 47.2 M = 755 M
#   ──────────────────────────────────────────────
#   total                              ≈ 0.96 B
#
# Memory @ bf16 + fp32 master on 80 GB H100 (rough):
#   params bf16 2 + master 4 + 2 moments 8 + fp32 grad buf 4 + bf16 grads 2
#   ≈ 20 GB optimizer/params; + activations (batch 8 / seq 2048, no ckpt) ~15-25;
#   + CUDA-graph pool/CE ~ few  → ~45-55 GB. Fits, with room. Raise batch if
#   nvidia-smi shows headroom; drop to 4 if it OOMs.

[model]
d_model				2048
vocab_size			50304
n_layers			16
n_heads				16
n_kv_heads			8		# GQA: 2x fewer KV heads
head_dim			128
rope_theta			500000
layer_norm_eps			1e-5
init_std			0.02

hidden_size_multiplier		1.0
hidden_size_multiple_of		256		# ffn ≈ 5632

use_qk_norm			0
use_head_qk_norm		0
block_type			reordered_norm
attention_backend		sdpa
gated_attention			none
sliding_window_size		-1
rope_scaling_type		none
layer_norm_type			rms_norm
use_float8			0
use_conv			0
use_moe				0
multi_res			0

num_mtp_heads			3
mtp_loss_weight			0.1

# No activation checkpointing — 1B fits without it on H100, keeps CUDA graph clean.
activation_checkpoint_mode	none
activation_checkpoint_interval	1

[training]
steps				50000
batch_size			8		# 4 if it OOMs; 12-16 if nvidia-smi shows headroom
seq_len				2048
lr				3.0e-4
warmup_steps			2000
grad_accum			4		# effective batch = 32
optimizer			adamw
scheduler			cosine
weight_decay			0.1
max_grad_norm			1.0

bf16				1
amp				0
grad_scaler			0

profile				1		# print per-stage timing + memory report (Task 2)
log_interval			10

# ALL run outputs go to the attached VOLUME, never the root disk (root fills up
# and stops the instance). Checkpoints of a 1B model are ~2GB each.
save				/media/volume/Prep_and_Voice_Training/runs/1B/model.pt
checkpoint_interval		5000
keep_checkpoints		2
report_every			300
heartbeat_path			/media/volume/Prep_and_Voice_Training/runs/1B/heartbeat.txt

[optimization]
fused				0		# routes through the kernel-wired Transformer
foreach_optimizer		1
gpu_data			0		# OpenWebText corpus streams from disk
cuda_graph			1
zero1				0
mup				0

[data]
# OpenWebText, GPT-2 tokenized, already on the media volume (same as the 3B conf).
data_path			/media/volume/Prep_and_Voice_Training/data/openwebtext_gpt2.npy
bpe_vocab			/media/volume/Prep_and_Voice_Training/data/gpt2/vocab.json

[device]
device				cuda
