# olmo_125M_h100.conf — 125M param model, all optimizations enabled
# Tuned for Jetstream H100 (80 GB HBM3, sm_90, native FP8)

[model]
d_model			768
vocab_size		50257
n_layers		12
n_heads			12
n_kv_heads		4		# GQA: fewer KV heads, faster attention
head_dim		-1		# auto = 64
rope_theta		500000
layer_norm_eps		1e-6
init_std		0.02
hidden_size_multiple_of	256
hidden_size_multiplier	1.5
use_qk_norm		1
use_head_qk_norm	0
layer_norm_type		fused_rms_norm	# custom CUDA kernel

# Block / attention
block_type		reordered_norm
attention_backend	sdpa		# flash2 if available, sdpa as safe default
gated_attention		none
sliding_window_size	-1		# full attention

# RoPE
rope_scaling_type	none
rope_scaling_factor	1.0

# Multi-token prediction
num_mtp_heads		2
mtp_loss_weight		0.1

# Activation checkpointing — OFF on H100 (80 GB is plenty for 125M)
activation_checkpoint_mode	none
activation_checkpoint_interval	1

# Float8 — H100 has native FP8 (Hopper transformer engine)
use_float8		1

# Convolution
use_conv		0

# MoE (disabled for dense 125M)
use_moe			0

# DC-MRE
multi_res_char_buckets	4096
multi_res_phrase_buckets	8192
multi_res_inner_dim	64

[training]
steps			10000
batch_size		32		# H100 can handle large batches easily
seq_len			1024		# longer context — plenty of VRAM
lr			3e-4
warmup_steps		200
grad_accum		1		# no accumulation needed — batch fits in memory
optimizer		adamw
scheduler		cosine
amp			1		# BF16 mixed precision (native on H100)
grad_scaler		0		# not needed for BF16
max_grad_norm		1.0
weight_decay		0.01
seed			42
profile			1		# print timing + memory report
log_interval		10
save			checkpoints/125M_h100.pt

# Evaluation
eval_interval		500

# Checkpointing
checkpoint_interval	2000
keep_checkpoints	3

# Curriculum scheduling (disabled)
target_seq_len		-1
seq_len_warmup_steps	0
target_batch_size	-1
batch_size_ramp_steps	0

[data]
data_path		/media/volume/Prep_and_Voice_Training/data/tinystories_gpt2.npy
bpe_vocab		/media/volume/Prep_and_Voice_Training/data/gpt2/vocab.json

[optimization]
fused			1		# fused QKV + gate_up + SwiGLU + attention
mup			1		# muP width-scaled init
multi_res		1		# DC-MRE multi-resolution embeddings
foreach_optimizer	1		# batched _foreach_ ops (~7 kernel launches)
gpu_data		1		# full dataset GPU-resident (H100 has 80 GB)
gpu_data_max_tokens	0		# auto VRAM budget
cuda_graph		1		# native BF16 kernels = zero dynamic allocs = safe for graph capture

[device]
device			cuda
